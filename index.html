<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAN360 — PCM Clealco</title>

<!-- Dependências externas -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
/* ═══════════════════════════════════════════════
   VARIÁVEIS E RESET
   ═══════════════════════════════════════════════ */
:root {
  --yellow:    #F8C100;
  --yellow-dk: #daa900;
  --red:       #C8102E;
  --sidebar-w: 52px;
  --sidebar-expanded: 220px;
  --topbar-h:  52px;
  --font:      'Sora', sans-serif;
  --dark1:     #1e1e1e;
  --dark2:     #2a2a2a;
  --dark3:     #363636;
  --dark4:     #444;
  --text-light:#f0f0f0;
  --text-muted:#9a9a9a;
  --bg:        #f4f4f5;
  --card-bg:   #ffffff;
  --border:    #e4e4e7;
  --green:     #16a34a;
  --green-l:   #dcfce7;
  --red-l:     #fee2e2;
  --amber:     #d97706;
  --amber-l:   #fef3c7;
  --blue:      #2563eb;
  --radius:    10px;
  --radius-sm: 6px;
  --shadow:    0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-md: 0 4px 12px rgba(0,0,0,.10);
  --transition: 220ms cubic-bezier(.4,0,.2,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: var(--font); background: var(--bg); color: #1a1a1a; font-size: 13px; }

/* ═══════════════════════════════════════════════
   LAYOUT PRINCIPAL
   ═══════════════════════════════════════════════ */
#app {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--topbar-h) 1fr;
  height: 100vh;
  transition: grid-template-columns var(--transition);
}
#app.sidebar-open {
  grid-template-columns: var(--sidebar-expanded) 1fr;
}

/* ═══════════════════════════════════════════════
   TOPBAR
   ═══════════════════════════════════════════════ */
#topbar {
  grid-column: 1 / -1;
  grid-row: 1;
  background: var(--yellow);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px 0 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
  height: 100%;
  padding: 0 16px;
}

.topbar-page-icon {
  width: 32px;
  height: 32px;
  background: rgba(0,0,0,.12);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.topbar-page-icon i { font-size: 17px; color: var(--dark1); }

.topbar-page-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .08em;
  color: var(--dark1);
  text-transform: uppercase;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.topbar-logo {
  height: 30px;
  object-fit: contain;
}

.topbar-btn {
  height: 32px;
  padding: 0 12px;
  border: none;
  border-radius: var(--radius-sm);
  background: rgba(0,0,0,.12);
  color: var(--dark1);
  font-family: var(--font);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background var(--transition);
}
.topbar-btn:hover { background: rgba(0,0,0,.2); }
.topbar-btn i { font-size: 14px; }

/* ═══════════════════════════════════════════════
   SIDEBAR
   ═══════════════════════════════════════════════ */
#sidebar {
  grid-column: 1;
  grid-row: 2;
  background: var(--dark2);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  z-index: 90;
  transition: width var(--transition);
  width: var(--sidebar-w);
  position: relative;
}
#sidebar:hover, #sidebar.pinned {
  width: var(--sidebar-expanded);
}
#sidebar:hover ~ #main-content,
#sidebar.pinned ~ #main-content {
  /* Não muda o grid — sidebar flutua sobre o conteúdo */
}

/* M360 no topo da sidebar */
.sidebar-brand {
  height: var(--topbar-h);
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,.06);
  flex-shrink: 0;
  overflow: hidden;
  white-space: nowrap;
}
.sidebar-brand-icon {
  width: 26px;
  height: 26px;
  background: var(--yellow);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 10px;
  font-weight: 800;
  color: var(--dark1);
  letter-spacing: -.5px;
}
.sidebar-brand-text {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-light);
  opacity: 0;
  transition: opacity var(--transition);
  letter-spacing: .02em;
}
#sidebar:hover .sidebar-brand-text,
#sidebar.pinned .sidebar-brand-text { opacity: 1; }

/* Grupos de navegação */
.sidebar-scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 8px 0;
}
.sidebar-scroll::-webkit-scrollbar { width: 3px; }
.sidebar-scroll::-webkit-scrollbar-track { background: transparent; }
.sidebar-scroll::-webkit-scrollbar-thumb { background: var(--dark4); border-radius: 2px; }

.nav-group-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--text-muted);
  padding: 14px 14px 4px;
  white-space: nowrap;
  overflow: hidden;
  opacity: 0;
  transition: opacity var(--transition);
  height: 0;
}
#sidebar:hover .nav-group-label,
#sidebar.pinned .nav-group-label {
  opacity: 1;
  height: auto;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 14px;
  cursor: pointer;
  white-space: nowrap;
  overflow: hidden;
  color: rgba(255,255,255,.65);
  border-radius: 0;
  transition: background var(--transition), color var(--transition);
  text-decoration: none;
  position: relative;
}
.nav-item:hover:not(.disabled) {
  background: rgba(255,255,255,.06);
  color: var(--text-light);
}
.nav-item.active {
  background: rgba(248,193,0,.12);
  color: var(--yellow);
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--yellow);
  border-radius: 0 2px 2px 0;
}
.nav-item.disabled {
  opacity: .35;
  cursor: not-allowed;
}
.nav-item i {
  font-size: 18px;
  flex-shrink: 0;
  width: 24px;
  text-align: center;
}
.nav-item-label {
  font-size: 12px;
  font-weight: 500;
  opacity: 0;
  transition: opacity var(--transition);
}
#sidebar:hover .nav-item-label,
#sidebar.pinned .nav-item-label { opacity: 1; }

.nav-badge {
  margin-left: auto;
  font-size: 9px;
  background: rgba(255,255,255,.1);
  color: var(--text-muted);
  padding: 2px 5px;
  border-radius: 4px;
  opacity: 0;
  transition: opacity var(--transition);
}
#sidebar:hover .nav-badge,
#sidebar.pinned .nav-badge { opacity: 1; }

/* ═══════════════════════════════════════════════
   CONTEÚDO PRINCIPAL
   ═══════════════════════════════════════════════ */
#main-content {
  grid-column: 2;
  grid-row: 2;
  overflow-y: auto;
  overflow-x: hidden;
  background: var(--bg);
  position: relative;
}
#main-content::-webkit-scrollbar { width: 6px; }
#main-content::-webkit-scrollbar-track { background: transparent; }
#main-content::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

/* Área do módulo ativo */
#module-container {
  min-height: 100%;
  padding: 20px;
}

/* Loading do módulo */
#module-loading {
  display: none;
  align-items: center;
  justify-content: center;
  height: 200px;
  gap: 10px;
  color: var(--text-muted);
  font-size: 13px;
}
#module-loading.show { display: flex; }
.loading-spinner {
  width: 20px;
  height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--yellow);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════════════════════════════════════════════
   COMPONENTES COMUNS
   ═══════════════════════════════════════════════ */

/* Cards */
.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  padding: 16px;
}
.card-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: #6b7280;
  margin-bottom: 12px;
}

/* Métricas */
.metrics-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}
@media (max-width: 900px) {
  .metrics-row { grid-template-columns: repeat(2, 1fr); }
}
.metric {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: var(--shadow);
}
.m-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: #9ca3af;
  margin-bottom: 4px;
}
.m-val {
  font-size: 26px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 3px;
  color: var(--yellow);
}
.m-sub {
  font-size: 10px;
  color: #9ca3af;
}

/* Filtros */
.filters-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  flex-wrap: wrap;
  box-shadow: var(--shadow);
}
.filter-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: #9ca3af;
}

/* Dropdown */
.dd-wrap { position: relative; }
.dd-btn {
  height: 30px;
  padding: 0 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  font-family: var(--font);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  color: #374151;
  transition: border-color var(--transition), box-shadow var(--transition);
  max-width: 220px;
  overflow: hidden;
}
.dd-btn:hover { border-color: #9ca3af; }
.dd-btn i { font-size: 14px; color: #6b7280; flex-shrink: 0; }
.dd-btn .dd-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.dd-btn .dd-arrow { font-size: 12px; flex-shrink: 0; transition: transform var(--transition); }
.dd-panel {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  min-width: 200px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-md);
  z-index: 200;
  display: none;
  padding: 4px 0;
  max-height: 280px;
  overflow-y: auto;
}
.dd-panel.show { display: block; }
.dd-sep { height: 1px; background: var(--border); margin: 4px 0; }
.dd-group {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: #9ca3af;
  padding: 6px 12px 2px;
}
.dd-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 12px;
  font-size: 11px;
  font-weight: 500;
  color: #374151;
  cursor: pointer;
  transition: background var(--transition);
}
.dd-item:hover { background: var(--bg); }
.dd-item input[type=checkbox] { accent-color: var(--yellow); }
.dd-actions {
  display: flex;
  gap: 6px;
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
}
.dd-action-btn {
  flex: 1;
  height: 24px;
  font-size: 10px;
  font-family: var(--font);
  font-weight: 600;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: background var(--transition);
}
.dd-action-btn.primary { background: var(--yellow); color: var(--dark1); border-color: var(--yellow-dk); }
.dd-action-btn.secondary { background: var(--bg); color: #6b7280; }

/* Toast */
#toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--dark1);
  color: #fff;
  padding: 10px 16px;
  border-radius: var(--radius);
  font-size: 12px;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: var(--shadow-md);
  transform: translateY(60px);
  opacity: 0;
  transition: transform .3s, opacity .3s;
  z-index: 1000;
  max-width: 360px;
}
#toast.show { transform: translateY(0); opacity: 1; }
#toast i { font-size: 16px; flex-shrink: 0; }
#toast.ok   { background: var(--green); }
#toast.erro { background: #dc2626; }
#toast.info { background: var(--dark1); }

/* Banner status */
#banner {
  display: none;
  background: var(--amber-l);
  border-bottom: 1px solid #fbbf24;
  padding: 7px 20px;
  font-size: 11px;
  color: #92400e;
  align-items: center;
  gap: 8px;
}
#banner.show { display: flex; }
#banner i { font-size: 14px; }

/* Grid de gráficos */
.charts-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}
.chart-wrap {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
}
.chart-wrap canvas {
  display: block;
  max-height: 200px;
}
.chart-container {
  position: relative;
  height: 200px;
  width: 100%;
}
.chart-container-wide {
  position: relative;
  height: 160px;
  width: 100%;
}

/* Área de importação */
.import-section { margin-top: 16px; }
.dropzone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 32px;
  text-align: center;
  cursor: pointer;
  transition: border-color var(--transition), background var(--transition);
  background: var(--card-bg);
}
.dropzone:hover, .dropzone.over {
  border-color: var(--yellow);
  background: #fffbeb;
}
.dropzone i { font-size: 32px; color: var(--yellow); margin-bottom: 8px; }
.dropzone p { font-size: 12px; color: #6b7280; }
.dropzone p strong { color: #374151; }
.file-types {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 12px;
  flex-wrap: wrap;
}
.file-type {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 20px;
  background: var(--bg);
  border: 1px solid var(--border);
  font-size: 10px;
  font-weight: 600;
}
.ext { color: #374151; }

/* Histórico de importações */
.hist-list { margin-top: 12px; }
.hist-title {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: #9ca3af;
  margin-bottom: 8px;
}
.hist-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 4px;
  font-size: 11px;
}
.hist-row i { font-size: 16px; flex-shrink: 0; }
.hist-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #374151; font-weight: 500; }
.hist-date { color: #9ca3af; font-size: 10px; flex-shrink: 0; }
.hist-badge {
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  flex-shrink: 0;
}
.hb-ok   { background: var(--green-l);  color: var(--green); }
.hb-err  { background: var(--red-l);    color: #dc2626; }
.hb-info { background: var(--amber-l);  color: var(--amber); }

/* Cores auxiliares */
.c-green  { color: var(--green); }
.c-red    { color: var(--red); }
.c-amber  { color: var(--amber); }
.c-blue   { color: var(--blue); }
.c-muted  { color: #9ca3af; }
</style>
</head>

      <span class="topbar-page-title" id="topbar-title">PROGRAMAÇÃO SEMANAL</span>
    </div>

  <!-- SIDEBAR -->
  <nav id="sidebar" onmouseleave="fecharSidebar()">

      <div class="sidebar-brand-icon" style="width:32px;font-size:8px;letter-spacing:-.3px">M360</div>

  <!-- CONTEÚDO PRINCIPAL -->
  <main id="main-content">
    <div id="banner" class="banner">
      <i class="ti ti-info-circle"></i>
      <span id="banner-msg"></span>
    </div>

      <div class="loading-spinner"></div>

    </div>

      <!-- Módulo ativo renderiza aqui -->
    </div>

<!-- Toast -->
<div id="toast"><i class="ti ti-info-circle" id="toast-icon"></i><span id="toast-msg"></span></div>

<!-- Scripts externos -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<!-- MAN360 -->
<script src="config.js"></script>
<script src="shared/db.js"></script>
<script src="shared/parsers.js"></script>
<script src="shared/importador.js"></script>

<script>
/* ═══════════════════════════════════════════════
   SHELL — Roteador e utilitários globais
   ═══════════════════════════════════════════════ */

let moduloAtivo = null;

/* ── Toast ── */
function showToast(msg, tipo, dur) {
  tipo = tipo || 'info'; dur = dur || 3500;
  const t = document.getElementById('toast');
  t.className = tipo;
  document.getElementById('toast-icon').className = 'ti ' + (
    tipo === 'ok' ? 'ti-check' : tipo === 'erro' ? 'ti-alert-circle' : 'ti-info-circle'
  );
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

/* ── Banner ── */
function showBanner(msg, show) {
  const b = document.getElementById('banner');
  document.getElementById('banner-msg').textContent = msg;
  b.classList.toggle('show', !!show);
}

/* ── Dropdown global ── */
document.addEventListener('click', e => {
  if (!e.target.closest('.dd-wrap'))
    document.querySelectorAll('.dd-panel').forEach(p => p.classList.remove('show'));
});
function toggleDD(id) {
  const panel = document.getElementById(id);
  const wasOpen = panel.classList.contains('show');
  document.querySelectorAll('.dd-panel').forEach(p => p.classList.remove('show'));
  if (!wasOpen) panel.classList.add('show');
}

/* ── Sidebar ── */
function fecharSidebar() {
  // Fecha automaticamente ao tirar o mouse (CSS :hover cuida disso)
}

/* ── Montar navegação via config ── */
function montarNav() {
  const container = document.getElementById('nav-items');
  container.innerHTML = '';

  MAN360_CONFIG.nav.forEach(grupo => {
    const groupLabel = document.createElement('div');
    groupLabel.className = 'nav-group-label';
    groupLabel.textContent = grupo.group;
    container.appendChild(groupLabel);

    grupo.items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'nav-item' + (item.disabled ? ' disabled' : '');
      el.dataset.page = item.page;
      el.innerHTML = `
        <i class="ti ti-${item.icon}"></i>
        <span class="nav-item-label">${item.label}</span>
        ${item.disabled ? '<span class="nav-badge">em breve</span>' : ''}
      `;
      if (!item.disabled) {
        el.addEventListener('click', () => navegarPara(item));
      }
      container.appendChild(el);
    });
  });
}

/* ── Roteador ── */
async function navegarPara(item) {
  // Atualizar estado da nav
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === item.page);
  });

  // Atualizar topbar
  document.getElementById('topbar-icon').className = `ti ti-${item.icon}`;
  document.getElementById('topbar-title').textContent = item.label.toUpperCase();

  // Mostrar loading
  const loading = document.getElementById('module-loading');
  const container = document.getElementById('module-container');
  loading.classList.add('show');
  container.innerHTML = '';

  try {
    // Carregar módulo dinamicamente
    await carregarModulo(item.page);
  } catch(e) {
    container.innerHTML = `<div style="padding:40px;text-align:center;color:#9ca3af">
      <i class="ti ti-alert-circle" style="font-size:32px;display:block;margin-bottom:8px"></i>
      Erro ao carregar módulo: ${e.message}
    </div>`;
  }
  loading.classList.remove('show');
}

/* ── Carregador de módulos ── */
const _modulosCarregados = {};
async function carregarModulo(page) {
  if (!_modulosCarregados[page]) {
    // Criar script tag dinamicamente
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = `modules/${page}.js`;
      s.onload = resolve;
      s.onerror = () => reject(new Error(`Módulo '${page}' não encontrado`));
      document.head.appendChild(s);
    });
    _modulosCarregados[page] = true;
  }
  // Cada módulo expõe window.Modulo.init(container)
  if (window.Modulos && window.Modulos[page]) {
    await window.Modulos[page].init(document.getElementById('module-container'));
  }
}

/* ── Exportar (delegado ao módulo ativo) ── */
function exportarModulo() {
  if (window.Modulos && window.Modulos[moduloAtivo] && window.Modulos[moduloAtivo].exportar) {
    window.Modulos[moduloAtivo].exportar();
  }
}

/* ── Inicialização ── */
window.addEventListener('load', () => {
  montarNav();
  // Navegar para o primeiro módulo habilitado
  const primeiro = MAN360_CONFIG.nav
    .flatMap(g => g.items)
    .find(i => !i.disabled);
  if (primeiro) navegarPara(primeiro);
});
</script>
